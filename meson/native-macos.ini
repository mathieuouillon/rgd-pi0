# Native (build machine) file for macOS + Homebrew.
#
#   meson setup build --native-file meson/native-macos.ini
#
# WHY THIS FILE EXISTS
# --------------------
# `pkg-config` on this machine resolves to MacPorts' (/opt/local/bin/pkg-config)
# and PKG_CONFIG_PATH is unset. Homebrew's fmt.pc and liblz4.pc therefore are
# NOT found, and because hipo-cpp declares both deps with a wrap fallback
#
#     dependency('fmt',    method: 'pkg-config', fallback: ['fmt', 'fmt_dep'])
#     dependency('liblz4', method: 'pkg-config', fallback: ['lz4', 'liblz4_dep'])
#
# meson silently *downloads* fmt and lz4 into external/ instead of using the
# copies already installed by Homebrew. That is slow, needs network, and
# clutters the subproject dir. Pointing pkg-config at Homebrew fixes it.
#
# This file does NOT set ROOT_INCLUDE_PATH: meson machine files only understand
# the sections [constants], [binaries], [properties], [cmake], [project options]
# and [built-in options] -- there is no way to export an environment variable
# from here. rootcling needs ROOT_INCLUDE_PATH at *build* time, so it must be
# exported in the shell that runs ninja. See README.md.

[binaries]
# Prefer Homebrew's pkgconf over MacPorts' pkg-config, so that the default
# search path already covers /opt/homebrew/lib/pkgconfig.
pkg-config = '/opt/homebrew/bin/pkg-config'

[built-in options]
# Belt and braces: works even if the pkg-config binary above is swapped out.
pkg_config_path = '/opt/homebrew/lib/pkgconfig'

# Help `dependency('ROOT', method: 'cmake')` and its transitive
# find_dependency(Vdt) locate the Homebrew-installed CMake config packages.
cmake_prefix_path = '/opt/homebrew'
